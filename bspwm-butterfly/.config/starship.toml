add_newline = false

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$cmd_duration\
$line_break\
$status\
$character
"""

[character]
success_symbol = "[λ](blue)"
error_symbol = "[λ](blue)"

[status]
disabled = false
format = "[-](red)[$status](bold red)[-](red) "

[cmd_duration]
format = "took [$duration](bold 208)"
